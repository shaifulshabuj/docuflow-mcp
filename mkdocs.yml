site_name: Docuflow
site_description: Lets AI agents build persistent, incrementally-maintained knowledge bases using the LLM Wiki pattern.
site_url: https://shaifulshabuj.github.io/docuflow-mcp/
repo_url: https://github.com/shaifulshabuj/docuflow-mcp
repo_name: shaifulshabuj/docuflow-mcp
edit_uri: edit/main/mkdocs-docs/

docs_dir: mkdocs-docs

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - minify:
      minify_html: true
  - mike:
      alias_type: symlink
      canonical_version: stable

extra:
  version:
    provider: mike
    default: stable
  social:
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/@doquflow/cli
    - icon: fontawesome/brands/github
      link: https://github.com/doquflows/docuflow

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - Concepts:
    - LLM Wiki Pattern: concepts/llm-wiki-pattern.md
    - Architecture: concepts/architecture.md
  - Reference:
    - CLI Commands: reference/cli.md
    - MCP Tools: reference/mcp-tools.md
    - Context Service: reference/context.md
    - Web UI: reference/web-ui.md
  - Guides:
    - Agent Integration: guides/agent-integration.md
  - Changelog: changelog.md
