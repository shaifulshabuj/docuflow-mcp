name: npm download stats

on:
  schedule:
    - cron: '0 9 * * 1'    # weekly — Mondays at 09:00 UTC
  workflow_dispatch:          # allow manual trigger from GitHub UI
  push:
    branches: [main]          # tag pushes excluded — commit-on-detached-HEAD fails
    paths:
      - 'scripts/generate-npm-chart.js'   # re-run when chart script changes

permissions:
  contents: write   # needed to commit the generated SVG

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate download chart
        run: node scripts/generate-npm-chart.js

      - name: Commit chart if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/stats/npm-downloads.svg

          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "No changes to chart — skipping commit."
          else
            git commit -m "stats: update npm download chart [skip ci]"
            git push
          fi
