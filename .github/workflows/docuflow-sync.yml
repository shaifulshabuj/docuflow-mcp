# #   C. docuflow sync       — Pure source ingest + index rebuild (no AI needed)
# #
# # This workflow runs Mode A (Claude Code Action) for the richest results.
# # Claude reads CLAUDE.md, sees the diff, and updates the wiki autonomously.
