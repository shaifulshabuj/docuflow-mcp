name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: TypeScript build (both packages)
        run: npm run build

      - name: Verify compiled dist files
        run: |
          echo "Checking CLI dist commands..."
          for cmd in init init-interactive status suggest watch watch-stop sync; do
            test -f "packages/cli/dist/commands/${cmd}.js" \
              && echo "  ✓ ${cmd}.js" \
              || (echo "  ✗ MISSING: ${cmd}.js" && exit 1)
          done
          echo "Checking server dist..."
          test -f packages/server/dist/index.js && echo "  ✓ server/dist/index.js" || exit 1
          test -f packages/cli/dist/index.js    && echo "  ✓ cli/dist/index.js"    || exit 1

      - name: Secrets scan
        run: |
          if grep -r "sk-ant\|ANTHROPIC_API_KEY\|npm_" \
            packages/ --include="*.ts" --include="*.js" \
            | grep -v "// \|process\.env\|env\.\|placeholder\|example"; then
            echo "FAIL: Possible hardcoded secret found in source"
            exit 1
          fi
          echo "PASS: No hardcoded secrets found"

  smoke-test:
    name: CLI Smoke Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & build
        run: npm install && npm run build

      - name: Initialize DocuFlow
        run: |
          mkdir -p .docuflow/sources .docuflow/wiki/entities .docuflow/wiki/concepts \
                   .docuflow/wiki/timelines .docuflow/wiki/syntheses .docuflow/specs
          echo "# Wiki Index" > .docuflow/index.md
          echo "# Operation Log" > .docuflow/log.md
          printf '# DocuFlow Schema\n\n## Domain\nCode/Architecture\n' > .docuflow/schema.md
          echo "# Test Source\n\n**TestEntity** is a sample entity for CI testing.\n" \
            > .docuflow/sources/test.md

      - name: sync (basic)
        run: node packages/cli/dist/index.js sync --no-lint --quiet
        working-directory: ${{ github.workspace }}

      - name: sync --source (single file)
        run: node packages/cli/dist/index.js sync --source test.md --no-lint
        working-directory: ${{ github.workspace }}

      - name: sync --fail-on-score (threshold check)
        run: |
          # Should exit 0 — score after basic ingest is typically ≥50
          node packages/cli/dist/index.js sync --fail-on-score 10 --no-lint --quiet
        working-directory: ${{ github.workspace }}

      - name: watch status (no daemon)
        run: |
          OUT=$(node packages/cli/dist/index.js watch status)
          echo "$OUT"
          echo "$OUT" | grep -q "stopped\|running"
        working-directory: ${{ github.workspace }}

      - name: watch stop (no daemon — graceful)
        run: node packages/cli/dist/index.js watch stop
        working-directory: ${{ github.workspace }}

      - name: watch stale PID cleanup
        run: |
          echo '{"pid":99999999,"started_at":"2026-01-01T00:00:00.000Z","bridge":"copilot","project_path":"'$PWD'","options":{"ai":true,"forceCopilot":true,"forceClaude":false,"forceCodex":false,"lintIntervalHours":24}}' \
            > .docuflow/watch.pid
          node packages/cli/dist/index.js watch status | grep -q "stale\|died"
          test ! -f .docuflow/watch.pid && echo "✓ stale PID cleaned up"
        working-directory: ${{ github.workspace }}

      - name: CLI help includes all new commands
        run: |
          HELP=$(node packages/cli/dist/index.js)
          for cmd in "watch stop" "watch status" "watch restart" \
                     "sync --ai" "--copilot" "--claude" "sync --since-commit"; do
            echo "$HELP" | grep -q "$cmd" \
              && echo "  ✓ help: $cmd" \
              || (echo "  ✗ MISSING from help: $cmd" && exit 1)
          done
        working-directory: ${{ github.workspace }}

      - name: Bridge detection unit test
        run: |
          node -e "
          const { detectBridge } = require('./packages/cli/dist/commands/watch');
          const tests = [
            [{ useAI: false }, 'none'],
            [{ useAI: true, forceClaude: true }, 'claude'],
          ];
          for (const [opts, expected] of tests) {
            const got = detectBridge(opts);
            if (got !== expected) {
              console.error('FAIL:', JSON.stringify(opts), '→ got', got, 'expected', expected);
              process.exit(1);
            }
            console.log('PASS:', JSON.stringify(opts), '→', got);
          }
          "
        working-directory: ${{ github.workspace }}

      - name: Pre-release check script
        run: bash scripts/pre-release-check.sh
        working-directory: ${{ github.workspace }}
